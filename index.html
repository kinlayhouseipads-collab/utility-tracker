<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UtilityPulse | Smart Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal -->
    <section id="auth-modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: #f8fafc; display: flex; justify-content: center; align-items: center;">
        <div style="background: #ffffff; padding: 40px; border: 1px solid #e2e8f0; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center;">
            <h2 style="color: #1e293b; margin-top: 0;">UtilityPulse Login</h2>
            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <input type="text" id="login-username" placeholder="Username (e.g. Oracle_Admin)" required style="padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px;">
                <button type="submit" style="background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold;">Login</button>
            </form>
        </div>
    </section>

    <div id="app-content" style="display: none;">
    <header class="app-header">
        <div class="container">
            <h1>Utility<span>Pulse</span></h1>
            <nav style="display: flex; gap: 10px; align-items: center;">
                <div id="filter-controls" style="display: flex; gap: 10px; align-items: center;">
                    <select id="company-filter" class="high-priority-glass" style="padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: var(--card-bg); backdrop-filter: blur(10px);">
                        <option value="">All Companies</option>
                        <option value="oracle">Oracle</option>
                        <option value="google">Google</option>
                        <option value="amazon">Amazon</option>
                        <option value="meta">Meta</option>
                        <option value="apple">Apple</option>
                        <option value="microsoft">Microsoft</option>
                    </select>
                    <label for="start-date-filter">Start Date</label>
                    <input type="date" id="start-date-filter" class="high-priority-glass" style="padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: var(--card-bg); backdrop-filter: blur(10px);">
                    <label for="end-date-filter">End Date</label>
                    <input type="date" id="end-date-filter" class="high-priority-glass" style="padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: var(--card-bg); backdrop-filter: blur(10px);">
                </div>
                <button id="view-stats">Trends</button>
                <button id="add-building" class="btn-primary">+ New Building</button>
                <button id="add-entry" class="btn-primary">+ New Entry</button>
            </nav>
        </div>
    </header>

    <main class="container">

        <section class="search-section" style="margin-top: 20px;">
            <input type="text" id="search-bar" placeholder="Search buildings by name or address..." style="width: 100%; padding: 15px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box;">
        </section>

        <section id="buildings-list" style="margin-top: 20px; max-height: 400px; overflow-y: auto; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            <!-- Buildings will be rendered here -->
        </section>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
            <h2 id="selected-building-name" style="margin: 0;">All Buildings Dashboard</h2>
            <button id="view-bill-history" class="btn-primary" style="display: none;">View Bill History</button>
        </div>

        <section class="dashboard-grid">
            <div class="card">
                <h3>Electricity</h3>
                <p class="stat" id="stat-electricity">-- kWh</p>
            </div>
            <div class="card">
                <h3>Water</h3>
                <p class="stat" id="stat-water">-- m³</p>
            </div>
            <div class="card">
                <h3>Gas</h3>
                <p class="stat" id="stat-gas">-- units</p>
            </div>
            <div class="card">
                <h3>Total Monthly Cost</h3>
                <p class="stat" id="stat-cost">-- $</p>
            </div>
        </section>

        <section class="chart-section" style="margin-top: 40px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            <canvas id="utilityChart"></canvas>
        </section>

        <section id="add-building-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
            <div class="modal-content" style="background: var(--card-bg); backdrop-filter: blur(10px); margin: 10% auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; width: 80%; max-width: 500px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <span id="close-add-building-modal" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
                <h2>Add New Building</h2>
                <form id="add-building-form">
                    <input type="text" id="add-b-name" placeholder="Building Name" required>
                    <input type="text" id="add-b-address" placeholder="Address" required>
                    <select id="add-b-company" required>
                        <option value="" disabled selected>Select Company</option>
                        <option value="oracle">Oracle</option>
                        <option value="google">Google</option>
                        <option value="amazon">Amazon</option>
                        <option value="meta">Meta</option>
                        <option value="apple">Apple</option>
                        <option value="microsoft">Microsoft</option>
                    </select>
                    <input type="text" id="add-b-mprn" placeholder="MPRN (11 digits)" pattern="\d{11}" title="Must be exactly 11 digits" required>
                    <input type="text" id="add-b-gprn" placeholder="GPRN (7 digits)" pattern="\d{7}" title="Must be exactly 7 digits" required>
                    <label style="font-size:0.9rem; margin-bottom:-10px;">Contract End Date</label>
                    <input type="date" id="add-b-enddate" required>
                    <button type="submit" class="btn-primary">Save Building</button>
                </form>
            </div>
        </section>

        <section id="edit-building-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
            <div class="modal-content" style="background: var(--card-bg); backdrop-filter: blur(10px); margin: 10% auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; width: 80%; max-width: 500px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <span id="close-edit-building-modal" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
                <h2>Edit Building</h2>
                <form id="edit-building-form">
                    <input type="hidden" id="edit-b-id">
                    <input type="text" id="edit-b-name" placeholder="Building Name" required>
                    <input type="text" id="edit-b-address" placeholder="Address" required>
                    <select id="edit-b-company" required>
                        <option value="" disabled selected>Select Company</option>
                        <option value="oracle">Oracle</option>
                        <option value="google">Google</option>
                        <option value="amazon">Amazon</option>
                        <option value="meta">Meta</option>
                        <option value="apple">Apple</option>
                        <option value="microsoft">Microsoft</option>
                    </select>
                    <input type="text" id="edit-b-mprn" placeholder="MPRN (11 digits)" pattern="\d{11}" title="Must be exactly 11 digits" required>
                    <input type="text" id="edit-b-gprn" placeholder="GPRN (7 digits)" pattern="\d{7}" title="Must be exactly 7 digits" required>
                    <label style="font-size:0.9rem; margin-bottom:-10px;">Contract End Date</label>
                    <input type="date" id="edit-b-enddate" required>
                    <button type="submit" class="btn-primary">Update Building</button>
                </form>
            </div>
        </section>

        <section id="entry-modal" class="modal">
            <div class="modal-content">
                <h2>Log New Reading</h2>
                <form id="tracker-form">
                    <input type="hidden" id="building-id">
                    <select id="utility-type" required>
                        <option value="electricity">Electricity</option>
                        <option value="water">Water</option>
                        <option value="gas">Gas</option>
                    </select>
                    <input type="number" id="reading-value" placeholder="Enter Value" required>
                    <input type="number" id="reading-cost" placeholder="Enter Cost ($)" step="0.01" required>
                    <input type="date" id="reading-date" required>
                    <button type="submit" class="btn-submit">Save Reading</button>
                </form>
            </div>
        </section>

        <section id="bill-history-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
            <div class="modal-content" style="background: var(--card-bg); backdrop-filter: blur(10px); margin: 15% auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; width: 80%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <span id="close-history-modal" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
                <h2 id="history-modal-title">Bill History</h2>
                <div id="bill-history-list" style="max-height: 300px; overflow-y: auto; margin-top: 20px;">
                    <!-- Bill history items will be rendered here -->
                </div>
            </div>
        </section>

    </main>

    <footer class="app-footer">
        <p>&copy; 2026 UtilityPulse. Data stored locally for privacy.</p>
    </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
