<header class="app-header">
    <div class="header-container">
        <div class="brand">
            <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEHyOTTvaVxXA/company-logo_200_200/company-logo_200_200/0/1630641921424/dob_developments_logo?e=2147483647&v=beta&t=3Xv0Dlrlb1COXctRBM2gOr_7yPA1wyr9C_ipTD3MKQM" alt="Logo">
            <h1>DOB <span>Accounts</span></h1>
        </div>

        <nav id="filter-controls">
            <div class="search-group">
                <i class="fas fa-search"></i>
                <input type="text" id="search-bar" placeholder="Search Property...">
            </div>
            
            <select id="company-filter">
                <option value="">All Companies</option>
            </select>

            <select id="property-filter">
                <option value="">All Properties</option>
            </select>

            <div class="date-window">
                <input type="date" id="start-date-filter">
                <span>to</span>
                <input type="date" id="end-date-filter">
            </div>

            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
    </div>
</header>
